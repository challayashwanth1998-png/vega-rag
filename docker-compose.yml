version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # AWS credentials must be provided or IAM roles must be attached to the instance
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Pinecone details
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-vegarag-index}
      # DynamoDB and S3 details
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME:-vegarag_table}
      - S3_DOCUMENT_BUCKET=${S3_DOCUMENT_BUCKET:-vegarag-documents}
      # Bedrock Models
      - BEDROCK_CHAT_MODEL=${BEDROCK_CHAT_MODEL:-amazon.nova-micro-v1:0}
      - BEDROCK_EMBED_MODEL=${BEDROCK_EMBED_MODEL:-amazon.titan-embed-text-v2:0}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Bake the local backend URL into the Next.js static build
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend
