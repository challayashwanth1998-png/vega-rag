name: Deploy Next.js Frontend/Widget
on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - 'apps/widget/**'
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
